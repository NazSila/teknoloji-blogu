{% extends "posts/base.html" %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">
        <h1>İletişim</h1>

        {% if basarili %}
        <div class="alert alert-success">
            Mesajınız başarıyla gönderildi.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary">
                Gönder
            </button>
        </form>
    </div>
</div>

{% endblock %}
